<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Quiz Points Challenge</title>
  <script type="module" crossorigin src="/assets/main-B7q-mliL.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/style-DOhjlxvl.css">
</head>
<body>
  <main class="wrapper" role="main">
    <section class="quiz-card">
      <header class="quiz-header">
        <h1>Quiz Points Challenge</h1>
        <p class="subtitle">Answer quizzes, earn points, and beat your best score.</p>
        <p class="subtitle">
          Question source:
          <a href="https://whatsapp.com/channel/0029Vb5ZiJD9MF8zTlDJl02h" target="_blank" rel="noopener noreferrer">WhatsApp Channel</a>
        </p>
      </header>

      <section id="setup-screen" class="screen">
        <label for="player-name">Your name</label>
        <input id="player-name" type="text" maxlength="30" placeholder="Enter your name" />
        <button id="start-quiz" class="btn primary">Start Quiz</button>
        <p id="setup-message" class="message" aria-live="polite"></p>
        <section class="leaderboard">
          <h3>Top Players</h3>
          <ol id="leaderboard-list"></ol>
        </section>
      </section>

      <section id="quiz-screen" class="screen" hidden>
        <div class="status-grid">
          <p><strong>Player:</strong> <span id="player-display">-</span></p>
          <p><strong>Question:</strong> <span id="question-progress">1 / 1</span></p>
          <p><strong>Round points:</strong> <span id="current-points">0</span></p>
          <p><strong>Best score:</strong> <span id="best-points">0</span></p>
        </div>
        <h2 id="question-text"></h2>
        <div id="answers" class="answers"></div>
        <p id="feedback" class="message" aria-live="polite"></p>
        <button id="next-question" class="btn" hidden>Next Question</button>
      </section>

      <section id="result-screen" class="screen" hidden>
        <h2>Quiz Complete</h2>
        <p id="result-text"></p>
        <section class="leaderboard">
          <h3>Top Players</h3>
          <ol id="leaderboard-list-result"></ol>
        </section>
        <button id="play-again" class="btn primary">Play Again</button>
      </section>
    </section>
  </main>
</body>
</html>
